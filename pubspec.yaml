name: workbench_shell
description: >-
  VS Code-style workbench layout shell for Flutter with activity bar,
  sidebar, editor area, tabbed bottom panel, status bar, menu bar, and
  structural primitives. Depends only on Flutter.
version: 0.18.0

homepage: https://github.com/repentsinner/workbench_shell
repository: https://github.com/repentsinner/workbench_shell
issue_tracker: https://github.com/repentsinner/workbench_shell/issues
topics:
  - workbench
  - vscode
  - ide
  - layout
  - desktop

environment:
  sdk: ^3.10.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.5
  # Used to derive surfaceTone from the chrome's editor background via
  # HCT. The package is already a transitive dep of Flutter Material 3,
  # so this adds no real footprint. See SPEC §spec:hct-tonal-resolution.
  material_color_utilities: ^0.13.0
  material_symbols_icons: ^4.2928.1
  # `@internal` marks the WorkbenchViewPane.inContainer collapsibility seam
  # off the public API (§spec:view-stack). meta is already a Flutter
  # transitive dep, so this adds no real footprint.
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/themes/
