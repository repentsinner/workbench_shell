name: workbench_shell
description: VS Code-style workbench layout shell with activity bar, sidebar, editor area, bottom panel, and status bar.
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.5
  # Used to derive surfaceTone from the chrome's editor background via
  # HCT. The package is already a transitive dep of Flutter Material 3,
  # so this adds no real footprint. See SPEC §9.15.
  material_color_utilities: ^0.13.0
  material_symbols_icons: ^4.2928.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/themes/
