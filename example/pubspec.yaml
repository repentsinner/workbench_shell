name: workbench_shell_example
description: >-
  Minimal Flutter app demonstrating workbench_shell chrome without any
  host-application dependencies. Renders five activity-bar sidebars, a
  tabbed bottom panel, a notification demo, and a status bar.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  workbench_shell:
    path: ../
  material_symbols_icons: ^4.2928.1
  # Host territory: the shell owns no storage (§spec:capability-boundary), so
  # the example supplies its own key–value store to demonstrate cross-restart
  # layout-state persistence (§spec:layout-state-persistence).
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
